      {d.map((p,i)=><path key={i} d={p}/>)}

  );
};

// ── Chart.js Canvas Wrapper (replaces Recharts for CDN reliability) ───────────
const ChartCanvas = ({ type, data, options, height = 200 }) => {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(canvasRef.current, { type, data, options });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [type, JSON.stringify(data), JSON.stringify(options)]);

  return (
    <div style={{ position: "relative", width: "100%", height }}>
      <canvas ref={canvasRef} role="img" aria-label={`${type} chart`}></canvas>
    </div>
  );
};

function App() {

  const SCREENS = {

    skills:    <SkillsDashboard/>,
    certifications:<CertDashboard/>,
